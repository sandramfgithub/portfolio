name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ARTIFACT_NAME: site-dist
  BUN_VERSION: 1.3.10
  CLOUDFLARE_COMPATIBILITY_DATE: 2026-03-16
  NODE_VERSION: 24.14.0
  PLAYWRIGHT_BASE_URL: http://127.0.0.1:4321

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_UMAMI_WEBSITE_ID: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.PUBLIC_UMAMI_WEBSITE_ID || '' }}
      PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.PUBLIC_UMAMI_SCRIPT_URL || 'https://cloud.umami.is/script.js' }}
      PUBLIC_UMAMI_DOMAINS: ${{ vars.PUBLIC_UMAMI_DOMAINS || 'sandramf.dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          retention-days: 7

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Route smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_WEB_SERVER_COMMAND: bun run preview:ci
        run: bun run test:smoke

  deploy-preview:
    name: Deploy preview
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: preview
      url: ${{ steps.preview-meta.outputs.preview-url }}

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Compute preview alias
        id: preview-meta
        env:
          WORKER_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          alias="pr-${{ github.event.pull_request.number }}"
          echo "preview-alias=$alias" >> "$GITHUB_OUTPUT"
          echo "preview-url=https://${alias}-${WORKER_NAME}.sandramf-developer.workers.dev" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker preview version
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_ALIAS: ${{ steps.preview-meta.outputs.preview-alias }}
          WORKER_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: >-
          bunx wrangler@4.30.0 versions upload
          --name="$WORKER_NAME"
          --assets=dist
          --compatibility-date=${{ env.CLOUDFLARE_COMPATIBILITY_DATE }}
          --preview-alias="$PREVIEW_ALIAS"
          --message="Preview for PR #${{ github.event.pull_request.number }}"

      - name: Write deployment summary
        env:
          PREVIEW_ALIAS: ${{ steps.preview-meta.outputs.preview-alias }}
          PREVIEW_URL: ${{ steps.preview-meta.outputs.preview-url }}
        run: |
          echo '### Cloudflare preview' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview alias: $PREVIEW_ALIAS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Preview URL: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://sandramf.dev

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist

      - name: Deploy Worker production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WORKER_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: >-
          bunx wrangler@4.30.0 deploy
          --name="$WORKER_NAME"
          --assets=dist
          --compatibility-date=${{ env.CLOUDFLARE_COMPATIBILITY_DATE }}
          --commit-dirty=true
          --keep-vars

      - name: Write deployment summary
        run: |
          echo '### Cloudflare production' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Production URL: https://sandramf.dev" >> "$GITHUB_STEP_SUMMARY"
